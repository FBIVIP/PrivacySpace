pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // JCenter (Bintray) was shut down permanently; the Xposed API artifacts
        // are served from the api.xposed.info Maven repo instead.
        maven { url 'https://api.xposed.info/' }
    }
}
rootProject.name = "PrivacySpace"
include ':app'
